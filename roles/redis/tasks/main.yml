---
# redis role — host: redis-1
# Goal: install Redis and configure it to listen on the network so poll-1 and
#       worker-1 can reach the queue on port {{ redis_port }} (6379).
# systemd managed, enabled on boot, idempotent. See GitHub issue #4.

- name: Install Redis server
  ansible.builtin.apt:
    name: redis-server
    state: present

- name: Deploy Redis configuration
  ansible.builtin.copy:
    src: redis.conf
    dest: /etc/redis/redis.conf
    owner: redis
    group: redis
    mode: "0640"
  notify: Restart redis

- name: Ensure Redis is enabled and started
  ansible.builtin.systemd_service:
    name: redis-server
    enabled: true
    state: started
