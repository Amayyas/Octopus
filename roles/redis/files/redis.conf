# Redis configuration — managed by Ansible (octopus / redis role).
# Listen on all IPv4 interfaces so poll-1 and worker-1 can reach the queue.

bind 0.0.0.0
protected-mode no
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Run under systemd (the Debian redis-server unit is Type=notify).
supervised systemd
daemonize no

pidfile /run/redis/redis-server.pid
loglevel notice
logfile /var/log/redis/redis-server.log
databases 16

# RDB persistence in the Debian data directory.
dir /var/lib/redis
save 900 1
save 300 10
save 60 10000
rdbcompression yes
dbfilename dump.rdb

appendonly no
