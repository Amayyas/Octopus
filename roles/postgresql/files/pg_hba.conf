# PostgreSQL Client Authentication Configuration — managed by Ansible.
# TYPE  DATABASE  USER      ADDRESS         METHOD

# Local administrative access over the Unix socket.
local   all       postgres                  peer
local   all       all                       peer

# Local TCP loopback.
host    all       all       127.0.0.1/32    scram-sha-256
host    all       all       ::1/128         scram-sha-256

# Allow the poll app clients (worker-1, result-1) to reach the paul database
# over the network, authenticated by password (scram-sha-256).
host    paul      paul      0.0.0.0/0       scram-sha-256
